about_content: | # this will include new lines to allow paragraphs
    Profesional con perfil híbrido en tecnología, comunicación y coordinación de proyectos en <mark>entornos internacionales</mark>.

    A lo largo de mi trayectoria he trabajado con <mark>equipos multidisciplinares</mark> facilitando la adaptación de productos digitales a distintos <mark>contextos culturales</mark>, contribuyendo a mejorar el acceso a la información a nivel global.

    Mi experiencia combina ingeniería de software, análisis técnico y gestión de proyectos con una fuerte orientación a la colaboración, la comunicación y la resolución de problemas complejos.

    En los últimos años he orientado mi desarrollo hacia proyectos con impacto social, manteniendo un interés activo en iniciativas relacionadas con sostenibilidad, cooperación y participación ciudadana.

